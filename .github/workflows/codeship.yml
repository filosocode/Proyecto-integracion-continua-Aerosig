name: AeroSIG Codeship Pipeline (CloudBees)

on:
  push:
    branches: [ develop, main, feature/codeship ]
  pull_request:
    branches: [ develop, main ]

jobs:
  setup:
    name: Setup - Instalar dependencias
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias del backend
        run: pip install -r backend/requirements.txt

  test:
    name: Test - Pruebas unitarias del backend
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r backend/requirements.txt

      - name: Ejecutar tests con pytest
        run: cd backend && pytest test_api.py -v

      - name: Verificar estructura del proyecto
        run: |
          echo "Verificando backend..."
          ls backend/
          echo "Verificando frontend..."
          ls frontend/
